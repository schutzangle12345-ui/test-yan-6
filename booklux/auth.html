<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access BookLux | Your AI Luxury Concierge</title>
    <meta name="description" content="Sign in or create an account with BookLux to access elite AI-driven concierge services for private jets, yachts, and luxury villas.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --color-primary: #D72424;
            --color-primary-dark: #b71e1e;
            --color-background: #0A0A0A;
            --color-surface: #141414;
            --color-text: #FFFFFF;
            --color-text-muted: #888888;
            --color-border: #262626;
            --color-accent: #FFFFFF;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-text);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-border);
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--color-text);
        }

        .nav-cta {
            background-color: var(--color-accent);
            color: #000;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .nav-cta:hover {
            opacity: 0.9;
        }

        /* Auth Section */
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 120px 20px;
        }

        .auth-card {
            background-color: var(--color-surface);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--color-border);
            padding: 48px;
            border-radius: 4px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-top: 16px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 32px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--color-text-muted);
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--color-text);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--color-border);
            padding: 12px 16px;
            color: var(--color-text);
            font-family: inherit;
            font-size: 16px;
            border-radius: 4px;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--color-accent);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            margin-top: 8px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--color-text-muted);
        }

        /* Footer */
        footer {
            padding: 80px 40px;
            border-top: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .footer-nav {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-nav a {
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .footer-nav a:hover {
            color: var(--color-text);
        }

        .social-links {
            display: flex;
            gap: 24px;
        }

        .social-links svg {
            width: 20px;
            height: 20px;
            fill: var(--color-text-muted);
            transition: fill 0.2s ease;
        }

        .social-links svg:hover {
            fill: var(--color-text);
        }

        .copyright {
            color: var(--color-text-muted);
            font-size: 12px;
        }

        /* Success Message Custom Styling */
        [data-success] {
            border: 1px solid rgba(0, 255, 0, 0.2);
            background: rgba(0, 255, 0, 0.05);
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        @media (max-width: 768px) {
            nav {
                padding: 16px 20px;
            }
            .nav-links {
                display: none;
            }
            .auth-card {
                padding: 32px 24px;
            }
        }
    </style>
  <base href="/booklux/" />
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <img src="logo.png" alt="test-yan-6 logo" style="height:40px;object-fit:contain">
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="auth.html" class="nav-cta" data-track="cta_click">Sign In</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="logo.png" alt="test-yan-6 logo" style="height:50px;object-fit:contain">
                <h1>Welcome to BookLux</h1>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn" onclick="switchTab('signin')" id="signin-tab">Sign In</button>
                <button class="tab-btn active" onclick="switchTab('signup')" id="signup-tab">Sign Up</button>
            </div>

            <!-- Sign Up Tab -->
            <div id="signup-content" class="tab-content active">
                <form data-backend="signup">
                    <input type="hidden" name="role" value="user">
                    
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" name="email" placeholder="name@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" minlength="6" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit" data-track="cta_click">Create Account</button>
                    
                    <p data-success style="display:none; color: #4ade80; font-weight: bold; margin-top: 1.5rem; font-size: 14px;">
                        Registration successful! Redirecting to login...
                    </p>
                </form>
                <div class="form-footer">
                    By joining, you agree to our Terms of Service and Privacy Policy.
                </div>
            </div>

            <!-- Sign In Tab -->
            <div id="signin-content" class="tab-content">
                <form>
                    <div class="form-group">
                        <label for="signin-email">Email Address</label>
                        <input type="email" id="signin-email" name="email" placeholder="name@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="signin-password">Password</label>
                        <input type="password" id="signin-password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit" data-track="cta_click">Sign In</button>
                </form>
                <div class="form-footer">
                    <a href="#" style="color: var(--color-primary); text-decoration: none;">Forgot your password?</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="auth.html">Sign In</a>
        </div>
        
        <div class="social-links">
            <a href="#">
                <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
            </a>
            <a href="#">
                <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
            </a>
            <a href="#">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </a>
        </div>

        <div class="copyright">
            © 2026 test-yan-6. All rights reserved.
        </div>
    </footer>

    <script>
        function switchTab(tab) {
            const tabs = ['signin', 'signup'];
            tabs.forEach(t => {
                document.getElementById(t + '-tab').classList.remove('active');
                document.getElementById(t + '-content').classList.remove('active');
            });

            document.getElementById(tab + '-tab').classList.add('active');
            document.getElementById(tab + '-content').classList.add('active');
        }

        // Auto-switch tab on successful signup (triggered by success message visibility)
        const signupForm = document.querySelector('form[data-backend="signup"]');
        const successObserver = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const successMsg = signupForm.querySelector('[data-success]');
                    if (successMsg.style.display === 'block') {
                        setTimeout(() => {
                            switchTab('signin');
                            successMsg.style.display = 'none';
                        }, 2000);
                    }
                }
            });
        });

        const successElem = signupForm.querySelector('[data-success]');
        if (successElem) {
            successObserver.observe(successElem, { attributes: true });
        }
    </script>

    <script>
    (function() {
      var BACKEND = 'http://localhost:3000/api';
      var TOKEN = '00f6b226360c61503f440b3294a5253f7893f128f33530c33550c3c12a613c31';
      var DOMAIN = 'booklux.ai';
      var HEADERS = { 'Content-Type': 'application/json', 'X-Token': TOKEN, 'X-Domain': DOMAIN };

      // 1. Auto-track pageview
      fetch(BACKEND + '/track', {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({ event: 'pageview', path: window.location.pathname })
      }).catch(function(){});

      // 2. Track CTA clicks
      document.addEventListener('click', function(e) {
        var el = e.target.closest('[data-track]');
        if (el) {
          fetch(BACKEND + '/track', {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify({ event: el.getAttribute('data-track'), path: window.location.pathname })
          }).catch(function(){});
        }
      });

      var FORM_ID = '131';

      // 3. Handle forms (Contact, Signup, Waitlist)
      document.addEventListener('submit', function(e) {
        var form = e.target.closest('form[data-backend]');
        if (!form) return;
        e.preventDefault();
        var type = form.getAttribute('data-backend');
        var endpoint = type === 'signup' ? '/users' : '/forms/submit';
        
        // Extract dynamic form fields
        var data = {};
        new FormData(form).forEach(function(v, k) { data[k] = v; });
        
        // Add Form ID if it's a general form and we have it
        if (type === 'form' && FORM_ID) {
          data.formId = FORM_ID;
        }

        var btn = form.querySelector('button[type="submit"]');
        var originalText = '';
        if (btn) {
          originalText = btn.innerText;
          btn.innerText = 'Sending...';
          btn.disabled = true;
        }

        // Track Form Submission Event
        fetch(BACKEND + '/track', {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({ 
            event: 'form_submission', 
            path: window.location.pathname,
            metadata: { formType: type } 
          })
        }).catch(function(){});

        // Submit Form Data
        fetch(BACKEND + endpoint, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify(data)
        }).then(function(r) { return r.json(); }).then(function(res) {
          if (res.success) {
            var msg = form.querySelector('[data-success]');
            if (msg) { msg.style.display = 'block'; }
            form.reset();
            if (btn) btn.style.display = 'none';
          } else {
            alert(res.error || 'Failed to submit form');
            if (btn) { btn.innerText = originalText; btn.disabled = false; }
          }
        }).catch(function(){
          alert('Network error occurred');
          if (btn) { btn.innerText = originalText; btn.disabled = false; }
        });
      });
    })();
    </script>

</body>
</html>
